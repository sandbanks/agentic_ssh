[package]
name = "agentic_ssh"
version = "0.1.2"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
russh = { version = "0.61" }
ssh2-config-rs = "0.7"
anyhow = "1"
mimalloc = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
glob = "0.3"
home = "0.5"
async-trait = "0.1"
toml = "1.0"
regex = "1"
clap = { version = "4", features = ["derive"] }
mcp-agent-install = { path = "mcp-agent-install" }

[dev-dependencies]
tempfile = "3"

[workspace]
members = [
    ".",
    "mcp-agent-install",
]
