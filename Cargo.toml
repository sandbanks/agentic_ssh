[package]
name = "agentic_ssh"
version = "0.1.1"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
russh = { version = "0.61" }
russh-keys = { version = "0.49" }
ssh2-config-rs = "0.7"
anyhow = "1"
mimalloc = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
glob = "0.3"
home = "0.5"
async-trait = "0.1"
toml = "0.8"
regex = "1"
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
